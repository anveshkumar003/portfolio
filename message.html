<!DOCTYPE html>
<html lang="en">
<head>
    <style>
:root{
            --bg: #0d0d0d;
            --surface: #1a1a2e;
            --primary:#BB86FC;
           --accent: #9C27B0;
           --text:#f5f5f5;
            --muted:#b0b0b0;
        }
        .btn {
      background: var(--accent);
      padding: 12px 25px;
      border-radius: 6px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }
*{
            margin: 10;
            padding: 10;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
    .btn:hover {
      background: #7C3AED;
    }

    .container{
        text-align: center;
      }
        button{
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
    
      body{
        background: var(--bg);
        color: var(--text);
        align-items: center;
        text-align: center;
      }
       header{
        display: flex;
        justify-content: space-between;
        background: var(--surface);
        text-align: center;
        padding: 20px 40px;
      }

      .cards{
        display: flex;
        gap:20px;
        padding: 40px;
        justify-content: center;
      }
      .card{
        background: var(--surface);
      padding: 50px;
      border-radius: 10px;
      width: 500px;
      justify-content: center;
    }

    .card h2 {
      color: var(--primary);
      margin-bottom: 10px;
    }

      
    </style>
    
</head>
<body>
  <section class="cards">
    <div class="card">
    <p><label for="Your Name">Enter Your Name :</label></p>
    <input type="text" id="Your Name" Name="Anvesh">
    <p><label For="mail id">Email ID:</label></p>
    <input type="email">
    <p><label>Phone Number</label></p>
    <input type="phone number">
    <p>Your Message</p>
    <input type="message"> 
    <br>
    <br>
            <button class="btn">Send</button>
    </br>
    </br>
    </div>
    </section>
</body>
</html>
